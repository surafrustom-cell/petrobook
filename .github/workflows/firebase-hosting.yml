name: Deploy PetroBook to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:

  deploy_production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Deploy Firestore security rules via the Firebase Rules REST API.
      # This ensures ownsAccount() uid-fallback (v1.2+) and isMemberOf() (v2.0)
      # are always live so cross-device login works without custom claims.
      - name: Deploy Firestore security rules
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          RULES_CONTENT=$(cat firestore.rules)
          BODY=$(jq -n --arg src "$RULES_CONTENT" \
            '{"source":{"files":[{"name":"firestore.rules","content":$src}]}}')
          HTTP=$(curl -s -o /tmp/rules_response.json -w "%{http_code}" -X POST \
            "https://firebaserules.googleapis.com/v1/projects/${PROJECT}/rulesets" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Ruleset create: HTTP ${HTTP}"
          if [[ "$HTTP" != "200" ]]; then
            echo "ERROR creating ruleset:"; cat /tmp/rules_response.json; exit 1
          fi
          RULESET_NAME=$(jq -r '.name' /tmp/rules_response.json)
          echo "Ruleset: ${RULESET_NAME}"
          RELEASE_BODY=$(jq -n --arg rs "$RULESET_NAME" \
            '{"release":{"name":"projects/'"${PROJECT}"'/releases/cloud.firestore","rulesetName":$rs}}')
          HTTP2=$(curl -s -o /tmp/release_response.json -w "%{http_code}" \
            -X PATCH \
            "https://firebaserules.googleapis.com/v1/projects/${PROJECT}/releases/cloud.firestore" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$RELEASE_BODY")
          echo "Release update: HTTP ${HTTP2}"
          if [[ "$HTTP2" != "200" ]]; then
            echo "ERROR updating release:"; cat /tmp/release_response.json; exit 1
          fi
          echo "Firestore security rules deployed successfully."

      # Attempt Firestore composite index creation via REST API.
      # 200=created, 409=already exists, 403=missing permission -- all treated as OK.
      # Grant roles/datastore.owner to firebase-adminsdk SA to make 403s go away.
      - name: Deploy Firestore composite indexes
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/collectionGroups"
          BODY='{"queryScope":"COLLECTION","fields":[{"fieldPath":"date","order":"ASCENDING"},{"fieldPath":"_syncedAt","order":"DESCENDING"}]}'
          ALL_OK=true
          for COLL in ledger history records; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "${BASE}/${COLL}/indexes" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${BODY}")
            if [[ "$HTTP" == "200" || "$HTTP" == "409" ]]; then
              echo "index ${COLL}: OK (HTTP ${HTTP})"
            elif [[ "$HTTP" == "403" ]]; then
              echo "WARNING: index ${COLL}: 403 - SA lacks datastore.indexes.create permission"
              echo "  --> Grant roles/datastore.owner to firebase-adminsdk SA to fix this"
            else
              echo "ERROR: index ${COLL}: unexpected HTTP ${HTTP}"
              ALL_OK=false
            fi
          done
          $ALL_OK && echo "Index step complete." || exit 1

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

      - name: Cleanup credentials
        if: always()
        run: rm -f "${{ steps.auth.outputs.credentials_file_path }}"

  deploy_preview:
    name: Deploy Preview Channel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 7d
          entryPoint: .
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: ${{ steps.deploy_preview.outputs.details_url }}`
            })
