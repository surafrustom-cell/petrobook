name: Deploy PetroBook to Firebase Hosting

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # Auto-deploy to production on every push to main
  pull_request:
    branches:
      - main          # Deploy preview channel for every PR targeting main

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  checks: write
  contents: read
  pull-requests: write   # Needed to post preview URL as PR comment

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Production deploy (push to main) ──────────────────────────────────────
  deploy_production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        # Pin to v12 -- v13+ calls serviceusage.googleapis.com before deploying,
        # which requires an extra IAM role on the service account. v12 skips that check.
        run: npm install -g firebase-tools@12.9.1

      # google-github-actions/auth writes the service account JSON to a temp
      # file and exports GOOGLE_APPLICATION_CREDENTIALS for all later steps.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Deploy Firestore rules + indexes via CLI.
      # action-hosting-deploy@v0 only handles Hosting -- rules need the CLI.
      - name: Deploy Firestore rules and indexes
        run: |
          firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --non-interactive

      # Deploy Firebase Hosting via the official GitHub Action.
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

      - name: Cleanup credentials
        if: always()
        run: rm -f "${{ steps.auth.outputs.credentials_file_path }}"

  # ── Preview deploy (pull requests only) ───────────────────────────────────
  deploy_preview:
    name: Deploy Preview Channel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 7d
          entryPoint: .

      - name: Post preview URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **PetroBook preview deployed!**\n\nURL: ${{ steps.deploy_preview.outputs.details_url }}\n\nExpires: 7 days after last push to this PR.`
            })
