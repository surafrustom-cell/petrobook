name: Deploy PetroBook to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:

  deploy_production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Deploy indexes via Firestore Admin REST API.
      # 409 = index already exists = OK (idempotent).
      - name: Deploy Firestore composite indexes
        run: |
          TOKEN=$(gcloud auth print-access-token)
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          BASE="https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/collectionGroups"
          BODY='{"queryScope":"COLLECTION","fields":[{"fieldPath":"date","order":"ASCENDING"},{"fieldPath":"_syncedAt","order":"DESCENDING"}]}'
          for COLL in ledger history records; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "${BASE}/${COLL}/indexes" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${BODY}")
            echo "Index ${COLL}: HTTP ${HTTP}"
            if [[ "$HTTP" != "200" && "$HTTP" != "409" ]]; then
              echo "ERROR: ${COLL} returned ${HTTP}"; exit 1
            fi
          done
          echo "All Firestore indexes deployed."

      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: .

      - name: Cleanup credentials
        if: always()
        run: rm -f "${{ steps.auth.outputs.credentials_file_path }}"

  deploy_preview:
    name: Deploy Preview Channel
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 7d
          entryPoint: .
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: ${{ steps.deploy_preview.outputs.details_url }}`
            })
